<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trip</title>
</head>
<body>

<h2>Nuevo Trip</h2>

<form th:action="@{/trips/save}" th:object="${trip}" method="post">

    <input type="text" th:field="*{nombre}" placeholder="Nombre"/>
    <br>

    <textarea th:field="*{descripcion}"></textarea>
    <br>

    <select th:field="*{categoria}">
        <option th:each="cat : ${categorias}"
                th:value="${cat}"
                th:text="${cat.nombre}">
        </option>
    </select>

    <br>
    <button type="submit">Guardar</button>

</form>

</body>
</html>
